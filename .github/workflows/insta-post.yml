name: Instagram Post

on:
  schedule:
    - cron: '0 2 * * *'        # 02:00 UTC = 09:00 WIB daily
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Override post type (leave empty for auto from weekday)'
        required: false
        default: ''
      dry_run:
        description: 'Render only — skip commit and publish'
        type: boolean
        default: false
      lang:
        description: 'Caption language (id or en)'
        required: false
        default: 'id'

concurrency:
  group: instagram-post
  cancel-in-progress: false     # never kill a running publish

permissions:
  contents: write               # needed to commit rotation index and images

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run pipeline
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          # GITHUB_REPOSITORY and GITHUB_REF_NAME are set automatically — do NOT override them
          POST_TYPE: ${{ inputs.post_type }}
          DRY_RUN: ${{ inputs.dry_run }}
          CAPTION_LANG: ${{ inputs.lang || 'id' }}
        run: python scripts/run_ig.py
